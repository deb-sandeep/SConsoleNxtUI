<div class="page-body">
  <div class="exam-choice-dialog"
       style="width: 600px;">
    <div class="card border-default question-card">
      <div class="card-header">
        Select exam
      </div>
      <div class="card-body">
        <div class="table-shell">
          <table class="table table-sm table-bordered">
            <thead>
            <tr>
              <th style="width:70px;">Type</th>
              <th style="width:90px;">Duration</th>
              <th style="width:50px;">#P</th>
              <th style="width:50px;">#C</th>
              <th style="width:50px;">#M</th>
              <th style="width:70px;">Marks</th>
              <th style="width:250px;">Note</th>
              <th></th>
            </tr>
            </thead>
            <tbody>
              @for( exam of availableExams; track exam.id ) {
                <tr>
                  <td>{{exam.type}}</td>
                  <td class="date-cell">{{(exam.duration * 1000) | date:'HH:mm':'UTC'}}</td>
                  <td class="number-cell">{{exam.numPhyQuestions}}</td>
                  <td class="number-cell">{{exam.numChemQuestions}}</td>
                  <td class="number-cell">{{exam.numMathQuestions}}</td>
                  <td class="number-cell">{{exam.totalMarks}}</td>
                  <td>{{exam.note}}</td>
                  <td>
                    <button type="button" class="btn btn-sm btn-info"
                            (click)="startExam( exam )">
                      Start
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
