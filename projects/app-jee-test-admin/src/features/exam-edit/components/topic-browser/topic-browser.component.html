<ul ngbNav #nav="ngbNav" class="nav-tabs"
    [destroyOnHide]="false"
    [(activeId)]="activeSyllabusTabId"
    (navChange)="syllabusTabChanged($event)">

  <li [ngbNavItem]="1"
      *ngIf="topicMap()!['IIT Physics']">
    <button ngbNavLink>Physics</button>
    <ng-template ngbNavContent>
      <topic-list #phyTopics
                  [topics]="topicMap()!['IIT Physics']"
                  (topicChanged)="topicSelectionChanged($event)">
      </topic-list>
    </ng-template>
  </li>

  <li [ngbNavItem]="2"
      *ngIf="topicMap()!['IIT Chemistry']">
    <button ngbNavLink>Chemistry</button>
    <ng-template ngbNavContent>
      <topic-list #chemTopics
                  [topics]="topicMap()!['IIT Chemistry']"
                  (topicChanged)="topicSelectionChanged($event)">
      </topic-list>
    </ng-template>
  </li>

  <li [ngbNavItem]="3"
      *ngIf="topicMap()!['IIT Maths']">
    <button ngbNavLink>Maths</button>
    <ng-template ngbNavContent>
      <topic-list #mathTopics
                  [topics]="topicMap()!['IIT Maths']"
                  (topicChanged)="topicSelectionChanged($event)">
      </topic-list>
    </ng-template>
  </li>
</ul>
<div [ngbNavOutlet]="nav"></div>
