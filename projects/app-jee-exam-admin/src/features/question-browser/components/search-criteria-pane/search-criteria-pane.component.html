<div id="search-criteria-pane">
  <div class="criteria-controls">
    <div ngbAccordion>
      <div ngbAccordionItem [collapsed]="false" >
        <h2 ngbAccordionHeader>
          <button ngbAccordionButton>Syllabus</button>
        </h2>
        <div ngbAccordionCollapse>
          <div ngbAccordionBody>
            <ng-template>
              <ul ngbNav #nav="ngbNav" class="nav-tabs"
                  [destroyOnHide]="false"
                  [(activeId)]="activeSyllabusTabId"
                  (navChange)="syllabusChanged($event)">
                <li [ngbNavItem]="1">
                  <button ngbNavLink>Physics</button>
                  <ng-template ngbNavContent>
                    <topic-list #phyTopics
                                [topics]="syllabusMap['IIT Physics']?.topics"
                                (selectionChanged)="topicSelectionChanged($event)">
                    </topic-list>
                  </ng-template>
                </li>
                <li [ngbNavItem]="2">
                  <button ngbNavLink>Chemistry</button>
                  <ng-template ngbNavContent>
                    <topic-list #chemTopics
                                [topics]="syllabusMap['IIT Chemistry']?.topics"
                                (selectionChanged)="topicSelectionChanged($event)">
                    </topic-list>
                  </ng-template>
                </li>
                <li [ngbNavItem]="3">
                  <button ngbNavLink>Maths</button>
                  <ng-template ngbNavContent>
                    <topic-list #mathTopics
                                [topics]="syllabusMap['IIT Maths']?.topics"
                                (selectionChanged)="topicSelectionChanged($event)">
                    </topic-list>
                  </ng-template>
                </li>
              </ul>
              <div [ngbNavOutlet]="nav"></div>
            </ng-template>
          </div>
        </div>
      </div>
      <div ngbAccordionItem [collapsed]="false" >
        <h2 ngbAccordionHeader>
          <button ngbAccordionButton>Question Type</button>
        </h2>
        <div ngbAccordionCollapse>
          <div ngbAccordionBody>
            <ng-template>
              <div class="qtype-checkbox-group">
                @for (qType of QuestionBrowserService.QUESTION_TYPES; track qType) {
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox"
                           [id]="'qtype-' + qType"
                           [checked]="selectedQTypes.includes(qType)"
                           (change)="toggleQType(qType)">
                    <label class="form-check-label" [for]="'qtype-' + qType">{{ qType }}</label>
                  </div>
                }
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="search-bar">
    <button type="button" class="btn btn-sm btn-info"
            (click)="search()"
            [disabled]="isSearchCriteriaInvalid()">
      <span class="bi-search"></span>
      Search
    </button>
  </div>
</div>
